<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            width: 350px;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            margin-bottom: 20px;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .title {
            font-size: 16px;
            color: #718096;
            margin-bottom: 20px;
        }

        .description {
            font-size: 14px;
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #4a5568;
            font-weight: 600;
        }

        .social-btn:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
            transform: scale(1.1);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://ik.imagekit.io/AkashPortfolioAssets/akash.jpg?tr:w-384" alt="Profile" class="profile-img">
        
        <h2 class="name">Akash Halder</h2>
        <p class="title">Full Stack Developer</p>
        
        <p class="description">
            Building amazing web experiences with modern technologies. Passionate about clean code and user experience.
        </p>
        
        <div class="social-links">
            <a href="https://x.com/HalderXi" class="social-btn">𝕏</a>
            <a href="https://www.linkedin.com/in/akash-halder-nil/" class="social-btn">in</a>
            <a href="https://www.instagram.com/akash_coding_hub/" class="social-btn">⚡</a>
            <a href="example@gmail.com" class="social-btn">📧 </a>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-primary">Follow</button>
            <button class="btn btn-secondary">Message</button>
        </div>
    </div>
</body>
</html>
